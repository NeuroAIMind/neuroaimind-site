<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <!-- Dark background -->
  <rect width="1500" height="500" fill="#0d0d12"/>

  <!-- Neural network visualization - organic side (left, white) -->
  <g opacity="0.25" stroke="#ffffff" stroke-width="1.5" fill="none">
    <!-- connections -->
    <line x1="50" y1="60" x2="180" y2="140"/>
    <line x1="180" y1="140" x2="150" y2="280"/>
    <line x1="180" y1="140" x2="320" y2="100"/>
    <line x1="320" y1="100" x2="420" y2="200"/>
    <line x1="150" y1="280" x2="280" y2="350"/>
    <line x1="150" y1="280" x2="50" y2="380"/>
    <line x1="280" y1="350" x2="400" y2="400"/>
    <line x1="280" y1="350" x2="350" y2="300"/>
    <line x1="350" y1="300" x2="420" y2="200"/>
    <line x1="420" y1="200" x2="500" y2="150"/>
    <line x1="420" y1="200" x2="480" y2="320"/>
    <line x1="500" y1="150" x2="550" y2="60"/>
    <line x1="480" y1="320" x2="400" y2="400"/>
    <line x1="480" y1="320" x2="580" y2="380"/>
    <line x1="500" y1="150" x2="600" y2="200"/>
    <line x1="50" y1="60" x2="170" y2="30"/>
    <line x1="170" y1="30" x2="320" y2="100"/>
    <line x1="50" y1="380" x2="120" y2="450"/>
    <line x1="400" y1="400" x2="500" y2="460"/>
  </g>
  <g fill="#ffffff" opacity="0.35">
    <circle cx="50" cy="60" r="4"/>
    <circle cx="180" cy="140" r="6"/>
    <circle cx="150" cy="280" r="5"/>
    <circle cx="320" cy="100" r="4"/>
    <circle cx="420" cy="200" r="7"/>
    <circle cx="280" cy="350" r="5"/>
    <circle cx="350" cy="300" r="3"/>
    <circle cx="500" cy="150" r="5"/>
    <circle cx="480" cy="320" r="4"/>
    <circle cx="400" cy="400" r="4"/>
    <circle cx="50" cy="380" r="3"/>
    <circle cx="550" cy="60" r="3"/>
    <circle cx="580" cy="380" r="3"/>
    <circle cx="600" cy="200" r="4"/>
    <circle cx="170" cy="30" r="3"/>
    <circle cx="120" cy="450" r="3"/>
    <circle cx="500" cy="460" r="3"/>
  </g>

  <!-- Circuit network - geometric side (right, indigo) -->
  <g opacity="0.3" stroke="#6366f1" stroke-width="1.5" fill="none">
    <line x1="950" y1="80" x2="1050" y2="80"/>
    <line x1="1050" y1="80" x2="1050" y2="160"/>
    <line x1="1050" y1="160" x2="1180" y2="160"/>
    <line x1="1180" y1="160" x2="1180" y2="80"/>
    <line x1="1180" y1="80" x2="1300" y2="80"/>
    <line x1="1300" y1="80" x2="1300" y2="180"/>
    <line x1="1300" y1="180" x2="1420" y2="180"/>
    <line x1="1420" y1="180" x2="1420" y2="100"/>
    <line x1="1050" y1="160" x2="1050" y2="280"/>
    <line x1="1050" y1="280" x2="1180" y2="280"/>
    <line x1="1180" y1="280" x2="1180" y2="360"/>
    <line x1="1180" y1="360" x2="1300" y2="360"/>
    <line x1="1300" y1="360" x2="1300" y2="280"/>
    <line x1="1300" y1="280" x2="1420" y2="280"/>
    <line x1="1420" y1="280" x2="1420" y2="380"/>
    <line x1="950" y1="80" x2="950" y2="200"/>
    <line x1="950" y1="200" x2="1050" y2="280"/>
    <line x1="950" y1="200" x2="950" y2="350"/>
    <line x1="950" y1="350" x2="1050" y2="400"/>
    <line x1="1050" y1="400" x2="1180" y2="360"/>
    <line x1="1300" y1="180" x2="1180" y2="280"/>
    <line x1="1420" y1="380" x2="1300" y2="360"/>
  </g>
  <g fill="#6366f1" opacity="0.4">
    <rect x="945" y="75" width="10" height="10"/>
    <rect x="1045" y="75" width="10" height="10"/>
    <rect x="1045" y="155" width="10" height="10"/>
    <rect x="1175" y="155" width="10" height="10"/>
    <rect x="1175" y="75" width="10" height="10"/>
    <rect x="1295" y="75" width="10" height="10"/>
    <rect x="1295" y="175" width="10" height="10"/>
    <rect x="1415" y="175" width="10" height="10"/>
    <rect x="1045" y="275" width="10" height="10"/>
    <rect x="1175" y="275" width="10" height="10"/>
    <rect x="1175" y="355" width="10" height="10"/>
    <rect x="1295" y="355" width="10" height="10"/>
    <rect x="1295" y="275" width="10" height="10"/>
    <rect x="1415" y="275" width="10" height="10"/>
    <rect x="1415" y="375" width="10" height="10"/>
    <rect x="945" y="195" width="10" height="10"/>
    <rect x="945" y="345" width="10" height="10"/>
    <rect x="1045" y="395" width="10" height="10"/>
    <rect x="1415" y="95" width="10" height="10"/>
  </g>

  <!-- Center divider - gradient fade -->
  <rect x="748" y="60" width="2" height="380" fill="#333333" opacity="0.3"/>

  <!-- Main tagline - centered, large and bold -->
  <text x="750" y="210" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="48" fill="#ffffff" font-style="italic" letter-spacing="2">Neurons to Mind.</text>
  <text x="750" y="280" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="48" fill="#ffffff" font-style="italic" letter-spacing="2">Brain to AI.</text>

  <!-- Indigo accent line -->
  <rect x="690" y="305" width="120" height="3" rx="1" fill="#6366f1"/>

  <!-- Website -->
  <text x="750" y="345" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" fill="#666666" letter-spacing="5">NEUROAIMIND.ORG</text>
</svg>
